<svg xmlns="http://www.w3.org/2000/svg" width="512" height="192" viewBox="0 0 512 192" fill="none">
  <defs>
    <!-- 主云体：暖奶油 → 柔和雾蓝 -->
    <linearGradient id="body" x1="256" y1="26" x2="256" y2="172" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFDF7"/>
      <stop offset="0.55" stop-color="#F4F1EA"/>
      <stop offset="1" stop-color="#DCE6F3"/>
    </linearGradient>
    <!-- 云底投影：体积感 -->
    <linearGradient id="shade" x1="256" y1="96" x2="256" y2="172" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E8F0FF" stop-opacity="0"/>
      <stop offset="1" stop-color="#8FA6CE" stop-opacity="0.32"/>
    </linearGradient>
    <!-- 顶部高光 -->
    <linearGradient id="hi" x1="256" y1="34" x2="256" y2="78" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <!-- 金色描边/纹样 -->
    <linearGradient id="gold" x1="256" y1="74" x2="256" y2="146" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8E3A5"/>
      <stop offset="0.5" stop-color="#E6BF6B"/>
      <stop offset="1" stop-color="#C9933C"/>
    </linearGradient>
    <!-- 柔和投影 -->
    <filter id="shadow" x="24" y="40" width="464" height="136" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#8A9AB8" flood-opacity="0.20"/>
    </filter>
    <!-- 发光 -->
    <filter id="glow" x="220" y="96" width="72" height="56" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <!-- 主云形（更饱满圆润的连续弧线） -->
    <path d="M86 150c-23 0-42-17-42-39 0-20 16-36 35-38 4-19 22-33 44-33 12 0 22 4 31 11 12-14 30-22 50-22 18 0 35 7 47 19 11-4 22-7 35-7 18 0 34 5 48 13 12-9 27-14 43-14 21 0 40 9 52 26 6-2 13-4 20-4 25 0 46 19 48 44 19 3 33 19 33 38 0 21-18 38-40 38H86Z" fill="url(#body)" stroke="#E2C574" stroke-width="1.8"/>
    <!-- 底部体积阴影 -->
    <path d="M91 156c20-22 49-33 87-33 18 0 36 2 54 5 17-11 38-16 62-16 27 0 49 6 68 17 15-4 30-6 46-6 28 0 51 7 72 21 8 6 17 14 24 23H91Z" fill="url(#shade)"/>
    <!-- 顶部柔和高光 -->
    <path d="M140 76c20-12 52-18 88-18 36 0 66 6 84 18-8 8-20 13-34 13-10 0-18-3-26-6-8 5-18 8-30 8-12 0-23-3-31-9-10 6-23 9-38 9-14 0-26-3-35-8-8 4-16 6-25 6-12 0-22-5-29-13Z" fill="url(#hi)"/>
    <!-- 金色光弧：贯穿云顶 -->
    <path d="M168 92c34-18 142-18 176 0" stroke="url(#gold)" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.9"/>
    <!-- 左右如意卷草纹 -->
    <path d="M118 98c-13 2-20 12-20 23 11-2 18 4 19 13 6-6 11-14 11-21 0-7-4-13-10-15Z" fill="none" stroke="url(#gold)" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M394 98c13 2 20 12 20 23-11-2-18 4-19 13-6-6-11-14-11-21 0-7 4-13 10-15Z" fill="none" stroke="url(#gold)" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 中心金豆（点睛）+ 微光晕 -->
    <ellipse cx="256" cy="120" rx="34" ry="12" fill="#F8E3A5" opacity="0.35" filter="url(#glow)"/>
    <path d="M248 112c-5 4-8 9-8 14 0 5 4 9 10 9 4 0 7-2 10-4 3 2 6 4 10 4 6 0 10-4 10-9 0-5-3-10-8-14-2 4-6 6-12 6s-10-2-12-6Z" fill="url(#gold)" stroke="#B88838" stroke-width="0.6"/>
    <circle cx="256" cy="120" r="2.4" fill="#FFF6D8"/>
  </g>
</svg>
